<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hermes UI</title>
  <link rel="stylesheet" href="/styles.css?v=20260504-chat-input-two-sizes-92" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div>
          <h1>Hermes UI</h1>
          <p>Local session manager</p>
        </div>
        <button id="refreshBtn" title="Refresh">↻</button>
      </div>
      <input id="searchInput" class="search" placeholder="Search sessions / titles / content..." />
      <button id="newChatBtn" class="new-chat-btn" type="button">＋ New Chat</button>
      <div id="sessionList" class="session-list"></div>
    </aside>

    <main class="main">
      <section id="emptyState" class="empty">
        <h2>Select a session</h2>
        <p>Search or select a session on the left. View details, copy the resume command, rename, or delete on the right.</p>
      </section>

      <section id="detail" class="detail hidden">
        <div class="detail-header">
          <div>
            <h2 id="sessionTitle"></h2>
            <p id="sessionMeta"></p>
          </div>
          <div class="actions">
            <button id="copyResumeBtn">Copy Resume Command</button>
            <button id="renameBtn">Rename</button>
            <button id="deleteBtn" class="danger">Delete</button>
          </div>
        </div>
        <div id="commandBox" class="command"></div>
        <div id="stats" class="stats"></div>
        <div id="messages" class="messages"></div>
        <form id="chatForm" class="composer">
          <div id="attachmentList" class="attachment-list"></div>
          <input id="fileInput" type="file" multiple hidden />
          <button id="attachBtn" class="attach-btn" type="button" title="Add attachment">＋ Attach</button>
          <textarea id="chatInput" class="chat-input" rows="1" placeholder="Type a message. Enter to send, Shift+Enter for a new line"></textarea>
          <button id="sendBtn" type="submit">Send</button>
        </form>
      </section>
    </main>
  </div>
  <script src="/app.js?v=20260504-chat-input-two-sizes-92"></script>
</body>
</html>
