<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hermes UI</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div>
          <h1>Hermes UI</h1>
          <p>Local session manager</p>
        </div>
        <button id="refreshBtn" title="Refresh">↻</button>
      </div>
      <input id="searchInput" class="search" placeholder="搜索会话 / 标题 / 内容..." />
      <button id="newChatBtn" class="new-chat-btn" type="button">＋ 开始新对话</button>
      <div id="sessionList" class="session-list"></div>
    </aside>

    <main class="main">
      <section id="emptyState" class="empty">
        <h2>选择一个会话</h2>
        <p>左侧搜索或点击会话，右侧查看详情、复制恢复命令、重命名或删除。</p>
      </section>

      <section id="detail" class="detail hidden">
        <div class="detail-header">
          <div>
            <h2 id="sessionTitle"></h2>
            <p id="sessionMeta"></p>
          </div>
          <div class="actions">
            <button id="copyResumeBtn">复制恢复命令</button>
            <button id="renameBtn">重命名</button>
            <button id="deleteBtn" class="danger">删除</button>
          </div>
        </div>
        <div id="commandBox" class="command"></div>
        <div id="stats" class="stats"></div>
        <div id="messages" class="messages"></div>
        <form id="chatForm" class="composer">
          <div id="attachmentList" class="attachment-list"></div>
          <input id="fileInput" type="file" multiple hidden />
          <button id="attachBtn" class="attach-btn" type="button" title="添加附件">＋附件</button>
          <textarea id="chatInput" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
          <button id="sendBtn" type="submit">发送</button>
        </form>
      </section>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
